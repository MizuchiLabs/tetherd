version: "3"

env:
  CGO_ENABLED: 0
  IMAGE: ghcr.io/mizuchilabs/tetherd

tasks:
  update:
    desc: Update dependencies
    cmds:
      - go get -u ./...

  build:
    desc: Build binary
    cmds:
      - go build -ldflags="-s -w" -trimpath -o bin/tetherd

  lint:
    desc: Run go vet & lint
    cmds:
      - go mod tidy
      - go fmt ./...
      - go vet ./...
      - govulncheck ./...
      - go test -cover ./...

  snapshot:
    desc: Build snapshot
    cmds:
      - goreleaser --snapshot --clean --skip=validate,sign,sbom,archive
      - docker tag goreleaser.ko.local:latest $IMAGE:nightly
      - grype $IMAGE:nightly

  snapshot:push:
    desc: Build and push snapshot to registry
    deps: [snapshot]
    cmds:
      - docker push $IMAGE:nightly
